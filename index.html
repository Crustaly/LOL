  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends Stats Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body class="text-gray-100 min-h-screen">

    <!-- Login Page (shown when not logged in) -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
      <div class="w-full max-w-md mx-4">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-8 shadow-2xl">
          <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-100 mb-2">League of Legends</h1>
            <h2 class="text-xl font-semibold text-sky-400 mb-6">Stats Dashboard</h2>
            <p class="text-gray-400 text-sm">Enter your account information to view your stats</p>
          </div>
          
          <form id="loginForm" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">
                Riot API Key
                <span class="text-xs text-yellow-400 ml-2">⚠️ Expires every 24 hours</span>
              </label>
              <input type="text" id="apiKey" name="apiKey" required
                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-gray-100 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all"
                value="RGAPI-c1ea0b6a-a037-435a-a2c9-19a3733bf7ee"
                placeholder="RGAPI-xxxxx-xxxxx-xxxxx-xxxxx">
              <p class="text-xs text-gray-500 mt-1">
                Get a new key from <a href="https://developer.riotgames.com/" target="_blank" class="text-sky-400 hover:text-sky-300 underline">Riot Developer Portal</a>
              </p>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Game Name</label>
              <input type="text" id="gameName" name="gameName" required
                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-gray-100 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all"
                placeholder="e.g., Faker">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Tag Line</label>
              <input type="text" id="tagLine" name="tagLine" required
                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-gray-100 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all"
                placeholder="e.g., KR1">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">Region</label>
              <select id="region" name="region" required
                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-gray-100 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all">
                <option value="">Select a region...</option>
                <option value="americas">Americas</option>
                <option value="europe">Europe</option>
                <option value="asia">Asia</option>
              </select>
            </div>
            <div id="loginError" class="text-red-400 text-sm text-center hidden bg-red-900/20 border border-red-500/50 rounded-lg p-3"></div>
            <button type="submit" id="loginSubmitBtn"
              class="w-full px-6 py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="loginBtnText">Load Player Data</span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Main Dashboard (hidden until logged in) -->
    <div id="dashboardPage" class="hidden">
      <!-- Header -->
      <header class="border-b border-slate-700 overflow-hidden">
        <div class="w-full h-36 md:h-48 overflow-hidden relative">
          <img id="bannerImage1" src="Images/banner.jpg" alt="League of Legends Banner" class="w-full h-full object-cover transition-opacity absolute inset-0" style="object-position: center 20%; z-index: 1; transition-duration: 3000ms;">
          <img id="bannerImage2" src="Images/banner.jpg" alt="League of Legends Banner" class="w-full h-full object-cover transition-opacity absolute inset-0" style="object-position: center 20%; z-index: 2; opacity: 0; transition-duration: 3000ms;">
        </div>
      </header>

      <!-- Navigation Tabs -->
      <nav class="bg-slate-850 border-b border-slate-700 sticky top-0 z-10">
        <div class="container mx-auto px-6 flex flex-wrap justify-center gap-0 items-center">
          <div class="flex flex-wrap justify-center gap-0 flex-1">
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="1">Overview</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="2">Score</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="3">Match History</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="4">Quests</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="5">Mini game</button>
          </div>
          <button id="logoutBtn" onclick="handleLogout()" class="px-4 py-2 text-xs font-semibold uppercase tracking-wide bg-slate-700 hover:bg-slate-600 text-gray-300 rounded transition-colors duration-200 ml-2">
            Logout
          </button>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="container mx-auto px-6 py-8">
        <div id="dynamicContent" class="text-gray-300">Loading...</div>
      </main>
    </div>

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'slate-850': '#182028',
            }
          }
        }
      }
    </script>

  </body>
  </html>
