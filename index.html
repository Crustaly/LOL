  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends Stats Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body class="text-gray-100 min-h-screen">

    <!-- Login Page (shown when not logged in) -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center relative overflow-hidden">
      <!-- Background images for cycling -->
      <div class="absolute inset-0 w-full h-full">
        <img id="loginBgImage1" src="Images/loginsplashart1.jpg" alt="Login Background" class="w-full h-full object-cover absolute inset-0 transition-opacity" style="z-index: 1; transition-duration: 3000ms;">
        <img id="loginBgImage2" src="Images/loginsplashart1.jpg" alt="Login Background" class="w-full h-full object-cover absolute inset-0 transition-opacity" style="z-index: 2; opacity: 0; transition-duration: 3000ms;">
        <!-- Dark overlay for better text readability -->
        <div class="absolute inset-0 bg-black/60 z-10"></div>
      </div>
      <div class="w-full max-w-lg mx-4 relative z-20">
        <!-- Glassmorphism Card with backdrop blur -->
        <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-10 shadow-2xl ring-1 ring-white/10">
          <!-- Header Section -->
          <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-sky-500/20 to-blue-600/20 border border-sky-500/30 mb-4">
              <svg class="w-10 h-10 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
            </div>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-300 mb-2 tracking-tight">
              League of Legends
            </h1>
            <h2 class="text-2xl font-semibold text-sky-400 mb-3 tracking-wide">Stats Dashboard</h2>
            <div class="w-24 h-1 bg-gradient-to-r from-sky-500 to-blue-600 mx-auto rounded-full"></div>
            <p class="text-gray-300 text-sm mt-6 font-light">Enter your account information to view your stats</p>
          </div>
          
          <!-- Form Section -->
          <form id="loginForm" class="space-y-6">
            <!-- API Key Field -->
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
                Riot API Key
                <span class="text-xs text-amber-400 ml-auto font-normal bg-amber-400/10 px-2 py-0.5 rounded-full border border-amber-400/20">
                  ⚠️ Expires every 24 hours
                </span>
              </label>
              <input type="text" id="apiKey" name="apiKey" required
                class="w-full px-4 py-3.5 bg-slate-800/60 backdrop-blur-sm border border-slate-600/50 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/30 transition-all duration-200 hover:border-slate-500"
                value="RGAPI-05088425-2edd-412a-88c1-cd1136ebba37"
                placeholder="RGAPI-xxxxx-xxxxx-xxxxx-xxxxx">
              <p class="text-xs text-gray-400 mt-2 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Get a new key from 
                <a href="https://developer.riotgames.com/" target="_blank" class="text-sky-400 hover:text-sky-300 underline font-medium transition-colors">
                  Riot Developer Portal
                </a>
              </p>
            </div>
            
            <!-- Game Name Field -->
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Game Name
              </label>
              <input type="text" id="gameName" name="gameName" required
                class="w-full px-4 py-3.5 bg-slate-800/60 backdrop-blur-sm border border-slate-600/50 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/30 transition-all duration-200 hover:border-slate-500"
                placeholder="e.g., Faker">
            </div>
            
            <!-- Tag Line Field -->
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                </svg>
                Tag Line
              </label>
              <input type="text" id="tagLine" name="tagLine" required
                class="w-full px-4 py-3.5 bg-slate-800/60 backdrop-blur-sm border border-slate-600/50 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/30 transition-all duration-200 hover:border-slate-500"
                placeholder="e.g., KR1">
            </div>
            
            <!-- Region Field -->
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Region
              </label>
              <div class="relative">
                <select id="region" name="region" required
                  class="w-full px-4 py-3.5 pr-12 bg-slate-800/60 backdrop-blur-sm border border-slate-600/50 rounded-xl text-gray-100 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/30 transition-all duration-200 hover:border-slate-500 cursor-pointer appearance-none">
                  <option value="" disabled class="bg-slate-800 text-gray-400">Select a region...</option>
                  <option value="americas" class="bg-slate-800 text-gray-100 py-2">🌎 Americas</option>
                  <option value="europe" class="bg-slate-800 text-gray-100 py-2">🇪🇺 Europe</option>
                  <option value="asia" class="bg-slate-800 text-gray-100 py-2">🌏 Asia</option>
                </select>
                <!-- Custom Dropdown Arrow -->
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                  <svg class="w-5 h-5 text-sky-400 transition-transform duration-200" id="regionArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                  </svg>
                </div>
              </div>
            </div>
            
            <!-- Error Message -->
            <div id="loginError" class="text-red-300 text-sm text-center hidden bg-red-900/30 backdrop-blur-sm border border-red-500/50 rounded-xl p-4 flex items-center justify-center gap-2">
              <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
              </svg>
              <span></span>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" id="loginSubmitBtn"
              class="w-full px-6 py-4 bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-bold rounded-xl transition-all duration-300 shadow-lg hover:shadow-2xl hover:shadow-sky-500/50 transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:hover:shadow-lg flex items-center justify-center gap-2 group">
              <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
              </svg>
              <span id="loginBtnText">Load Player Data</span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Main Dashboard (hidden until logged in) -->
    <div id="dashboardPage" class="hidden">
      <!-- Header -->
      <header class="border-b border-slate-700 overflow-hidden">
        <div class="w-full h-36 md:h-48 overflow-hidden relative">
          <img id="bannerImage1" src="Images/banner.jpg" alt="League of Legends Banner" class="w-full h-full object-cover transition-opacity absolute inset-0" style="object-position: center 20%; z-index: 1; transition-duration: 3000ms;">
          <img id="bannerImage2" src="Images/banner.jpg" alt="League of Legends Banner" class="w-full h-full object-cover transition-opacity absolute inset-0" style="object-position: center 20%; z-index: 2; opacity: 0; transition-duration: 3000ms;">
        </div>
      </header>

      <!-- Navigation Tabs -->
      <nav class="bg-slate-850 border-b border-slate-700 sticky top-0 z-10">
        <div class="container mx-auto px-6 flex flex-wrap justify-center gap-0 items-center">
          <div class="flex flex-wrap justify-center gap-0 flex-1">
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="1">Overview</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="2">Score</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="3">Match History</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="4">Quests</button>
            <button class="tab px-8 py-4 text-sm font-semibold uppercase tracking-wide border-b-3 border-transparent hover:bg-slate-800 transition-colors duration-200" data-tab="5">Mini game</button>
          </div>
          <button id="logoutBtn" onclick="handleLogout()" class="px-4 py-2 text-xs font-semibold uppercase tracking-wide bg-slate-700 hover:bg-slate-600 text-gray-300 rounded transition-colors duration-200 ml-2">
            Logout
          </button>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="container mx-auto px-6 py-8">
        <div id="dynamicContent" class="text-gray-300">Loading...</div>
      </main>
    </div>

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'slate-850': '#182028',
            }
          }
        }
      }
    </script>

  </body>
  </html>
