  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends Stats Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>

    <div class="jumbotron">
      <h1>League Performance Dashboard</h1>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="1">Overview</div>
      <div class="tab" data-tab="2">Score</div>
      <div class="tab" data-tab="3">Top</div>
      <div class="tab" data-tab="4">Jungle</div>
      <div class="tab" data-tab="5">Mid</div>
      <div class="tab" data-tab="6">Bot</div>
      <div class="tab" data-tab="7">Support</div>
      <div class="tab" data-tab="8">Champions</div>
      <div class="tab" data-tab="9">Quests</div>
    </div>

    <div class="container">
      <canvas id="lineChart" style="display: none;"></canvas>

      <div class="content-section dynamic-section">
        <div id="dynamicContent">Loading...</div>
      </div>

    </div>

  </body>
  </html>
