  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web App</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>

    <div class="jumbotron">
      <h1>My Web App</h1>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="1">Overview</div>
      <div class="tab" data-tab="2">Score</div>
      <div class="tab" data-tab="3">Top</div>
      <div class="tab" data-tab="4">Jungle</div>
      <div class="tab" data-tab="5">Mid</div>
      <div class="tab" data-tab="6">Bot</div>
      <div class="tab" data-tab="7">Support</div>
      <div class="tab" data-tab="8">Champions</div>
      <div class="tab" data-tab="9">Quests</div>
    </div>

    <div class="container">
      <canvas id="lineChart"></canvas>

      <div class="content-section dynamic-section">
        <h2>Dynamic Section</h2>
        <div id="dynamicContent">Loading...</div>
      </div>

      <div class="content-section">
        <h2>Section 1</h2>
        <p>This section contains static content.</p>
      </div>

      <div class="content-section">
        <h2>Section 3</h2>
        <p>Another section with static content.</p>
      </div>

      <div class="content-section">
        <h2>Section 4</h2>
        <p>More static content goes here.</p>
      </div>
    </div>

  </body>
  </html>
